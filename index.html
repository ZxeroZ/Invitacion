<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitacion Boda</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>

<body>
    <header class="hero">
        <nav class="navbar">
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul>
                <li><a href="#section1">INICIO</a></li>
                <li><a href="#section2">INFORMACION</a></li>
                <li><a href="#section4">CONTACTO</a></li>
                <li><a class="mod-nav" href="#section3">RSVP</a></li>
            </ul>
        </nav>

        <div class="slide slide1"></div>
        <div class="slide slide2"></div>
        <div class="slide slide3"></div>
        <div class="hero-content">
            <h1>Jhon <span class="h1-m">&</span> Nathaly</h1>
            <div class="fecha">
                <img src="https://themes.sindevo.com/wedding-bells/images/swirl_left.png" alt="">
                <h2>14 - 12 - 2024</h2>
                <img src="https://themes.sindevo.com/wedding-bells/images/swirl_right.png" alt="">
            </div>
            <img class="birds" src="https://themes.sindevo.com/wedding-bells/images/birds_icon.png" alt="">
            <h2 class="frase">"Cualquier medida de tiempo a tu lado no será suficiente, Entonces empecemos con una nueva
                para siempre"</h2>

        </div>
    </header>

    <section class="contador">
        <div class="contador-ctn">
            <h1>"Esperando con ansias nuestro día especial..."</h1>

            <div class="contador-content">
                <img src="https://themes.sindevo.com/wedding-bells/images/swirl_left_small.png" alt="">
                <div class="countdown">
                    <div class="time-unit" id="days">
                        <span>00</span>
                        <div class="label">Días</div>
                    </div>
                    <div class="time-unit" id="hours">
                        <span>00</span>
                        <div class="label">Horas</div>
                    </div>
                    <div class="time-unit" id="minutes">
                        <span>00</span>
                        <div class="label">Minutos</div>
                    </div>
                    <div class="time-unit" id="seconds">
                        <span>00</span>
                        <div class="label">Seconds</div>
                    </div>
                </div>
                <img src="https://themes.sindevo.com/wedding-bells/images/swirl_left_small.png" alt="">
            </div>

            <a class="btn-asistencia" href="">Confirmar Asistencia</a>

            

        </div>
    </section>

    <section class="about">
        <div class="about-ctn">
            
        </div>
    </section>



    <script src="./js/index.js"></script>
</body>

</html>
